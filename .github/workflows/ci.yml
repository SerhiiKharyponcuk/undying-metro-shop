name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm exec prisma validate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/undying_metro
      - run: node --check admin/app.js
      - run: node --check community.js
