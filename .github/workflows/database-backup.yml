name: Encrypted database backup

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check backup secrets
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
        run: |
          test -n "$DATABASE_URL"
          test -n "$BACKUP_ENCRYPTION_KEY"
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Create encrypted backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
        run: |
          pg_dump "$DATABASE_URL" --no-owner --no-privileges \
            | gzip \
            | openssl enc -aes-256-cbc -salt -pbkdf2 -pass env:BACKUP_ENCRYPTION_KEY \
            -out undying-metro.sql.gz.enc
      - uses: actions/upload-artifact@v4
        with:
          name: undying-metro-db-${{ github.run_id }}
          path: undying-metro.sql.gz.enc
          retention-days: 7
          if-no-files-found: error
