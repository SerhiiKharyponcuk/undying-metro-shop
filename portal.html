<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#06100f" />
  <title>Undying Metro — Кабинет</title>
  <link rel="icon" href="assets/undying-metro-avatar.webp" type="image/webp" />
  <script src="config.js?v=11"></script>
  <style>
    :root{color-scheme:dark;font-family:Inter,system-ui,sans-serif;background:#050b0b;color:#e9ffff}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 20% 0,#123c38 0,transparent 38%),#050b0b}main{width:min(920px,calc(100% - 24px));margin:auto;padding:32px 0 70px}header{display:flex;gap:16px;align-items:center;margin-bottom:22px}header img{width:68px;height:68px;border-radius:18px}h1,h2,h3,p{margin:0}.tabs,.grid,.actions{display:flex;gap:10px;flex-wrap:wrap}.tabs{margin:18px 0}.tabs button,.card,form{border:1px solid #1b4a46;background:#081514;border-radius:18px}.tabs button,button{padding:12px 16px;color:#dffffb;background:#0d2926;border:1px solid #296963;border-radius:12px;font-weight:700}.tabs button.active,button.primary{background:#48e6d5;color:#03100f}section[hidden]{display:none}form{padding:18px;display:grid;gap:12px}label{display:grid;gap:6px;color:#a9c3c0}input,textarea{width:100%;padding:13px;border:1px solid #23423f;border-radius:11px;background:#040c0b;color:#fff;font:inherit}.grid{margin-top:16px}.card{padding:17px;display:grid;gap:9px;flex:1 1 280px}.muted{color:#8aa5a2;font-size:.9rem}.status{min-height:24px;color:#ff9d91}.numbers{display:flex;gap:12px;flex-wrap:wrap}.numbers span{background:#0b2421;border-radius:10px;padding:8px 10px}.penalty{border-left:3px solid #ff8b65;padding-left:12px;margin-top:8px}textarea{min-height:85px}.back{color:#74eade;text-decoration:none}
  </style>
</head>
<body><main>
  <header><img src="assets/undying-metro-avatar.webp" alt="" /><div><a class="back" href="./">← В магазин</a><h1>Личный кабинет</h1><p class="muted">Данные доступны только по персональному коду.</p></div></header>
  <nav class="tabs"><button class="active" data-tab="player">Сопровождающий</button><button data-tab="buyer">Покупатель</button></nav>
  <section id="playerSection">
    <form id="playerForm"><h2>Кабинет сопровождающего</h2><label>PUBG ID<input name="gameId" inputmode="numeric" pattern="[0-9]{5,20}" required /></label><label>Код доступа<input name="code" maxlength="10" required /></label><button class="primary">Открыть кабинет</button><p class="status" id="playerStatus"></p></form>
    <div id="playerResult"></div>
  </section>
  <section id="buyerSection" hidden>
    <form id="buyerForm"><h2>Проверка заказа</h2><label>PUBG ID покупателя<input name="gameId" inputmode="numeric" pattern="[0-9]{5,20}" required /></label><label>Код заказа<input name="code" maxlength="10" required /></label><button class="primary">Проверить статус</button><p class="status" id="buyerStatus"></p></form>
    <div class="grid" id="buyerResult"></div>
  </section>
  <script src="portal.js?v=1"></script>
</main></body></html>
